<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的枪战小游戏网站</title>
    <style>
        /* 页面样式，让游戏居中显示 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, 微软雅黑;
            color: white;
        }
        h1 {
            margin-bottom: 20px;
        }
        /* 游戏画布样式 */
        #gameCanvas {
            border: 3px solid #333;
            background-color: #000;
        }
        /* 操作说明样式 */
        .controls {
            margin-top: 15px;
            background-color: #2d2d2d;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🎮 我的枪战小游戏</h1>
    <!-- 游戏画布 -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- 操作说明 -->
    <div class="controls">
        <p>操作说明：WASD 移动 | 鼠标瞄准/点击射击 | 空格跳跃</p>
    </div>

    <!-- 游戏核心代码 -->
    <script>
        // 获取画布和绘图上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 玩家对象
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 40,
            height: 60,
            speed: 5,
            color: '#4CAF50',
            velocityY: 0,
            gravity: 0.8,
            jumpPower: -15,
            onGround: true
        };

        // 敌人对象数组
        let enemies = [];
        // 子弹对象数组
        let bullets = [];
        // 键盘状态
        const keys = {};

        // 生成敌人（每隔2秒生成一个）
        setInterval(() => {
            enemies.push({
                x: Math.random() * (canvas.width - 40),
                y: Math.random() * (canvas.height - 60),
                width: 40,
                height: 60,
                speed: 2,
                color: '#f44336'
            });
        }, 2000);

        // 键盘按下事件
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            // 空格跳跃
            if (e.key === ' ' && player.onGround) {
                player.velocityY = player.jumpPower;
                player.onGround = false;
            }
        });

        // 键盘松开事件
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // 鼠标点击射击
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 计算子弹方向
            const dx = mouseX - (player.x + player.width/2);
            const dy = mouseY - (player.y + player.height/2);
            const angle = Math.atan2(dy, dx);
            const bulletSpeed = 8;

            // 添加子弹
            bullets.push({
                x: player.x + player.width/2,
                y: player.y + player.height/2,
                radius: 5,
                dx: Math.cos(angle) * bulletSpeed,
                dy: Math.sin(angle) * bulletSpeed,
                color: '#ffeb3b'
            });
        });

        // 游戏循环
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 玩家移动逻辑
            if (keys['w'] || keys['W']) player.y -= player.speed;
            if (keys['s'] || keys['S']) player.y += player.speed;
            if (keys['a'] || keys['A']) player.x -= player.speed;
            if (keys['d'] || keys['D']) player.x += player.speed;

            // 边界检测（防止玩家出界）
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            // 重力和跳跃逻辑
            player.velocityY += player.gravity;
            player.y += player.velocityY;
            if (player.y > canvas.height - player.height) {
                player.y = canvas.height - player.height;
                player.velocityY = 0;
                player.onGround = true;
            }

            // 绘制玩家
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 绘制并更新敌人
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                // 敌人向玩家移动
                if (enemy.x < player.x) enemy.x += enemy.speed;
                if (enemy.x > player.x) enemy.x -= enemy.speed;
                if (enemy.y < player.y) enemy.y += enemy.speed;
                if (enemy.y > player.y) enemy.y -= enemy.speed;

                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

                // 检测子弹击中敌人
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const bullet = bullets[j];
                    if (
                        bullet.x > enemy.x &&
                        bullet.x < enemy.x + enemy.width &&
                        bullet.y > enemy.y &&
                        bullet.y < enemy.y + enemy.height
                    ) {
                        // 移除敌人和子弹
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break;
                    }
                }
            }

            // 绘制并更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;

                // 绘制子弹
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                ctx.fillStyle = bullet.color;
                ctx.fill();

                // 移除出界的子弹
                if (
                    bullet.x < 0 ||
                    bullet.x > canvas.width ||
                    bullet.y < 0 ||
                    bullet.y > canvas.height
                ) {
                    bullets.splice(i, 1);
                }
            }

            // 循环调用游戏帧
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
